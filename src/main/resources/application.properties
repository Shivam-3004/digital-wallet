spring.application.name=digital-wallet

# Use environment-specific configuration
# Development: mvn spring-boot:run -Dspring-boot.run.arguments="--spring.profiles.active=dev"
# Production: java -jar app.jar --spring.profiles.active=prod
# Testing: mvn test -Dspring.profiles.active=test

# Database Configuration - Use environment variables or env-specific profiles
spring.datasource.url=jdbc:postgresql://localhost:5432/digital-wallet
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:shivam884}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration - MUST be externalized in production
jwt.secret=${JWT_SECRET:ChangeThisInProduction2026SecureLongSecretKey}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:7}

# Email Verification Configuration
email.verification.expiration.hours=${EMAIL_VERIFICATION_EXPIRATION:24}

# Password Reset Configuration
password.reset.expiration.hours=${PASSWORD_RESET_EXPIRATION:1}

# Logging
logging.level.root=INFO
logging.level.com.shivam.digital_wallet=DEBUG
logging.level.com.shivam.digital_wallet.security=DEBUG

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
