spring.application.name=digital-wallet

# Database Configuration - MUST use environment variables in production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration - CRITICAL: Never use 'update' or 'create-drop' in production!
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration - MUST be strong and unique for each environment
jwt.secret=${JWT_SECRET}

# Logging - Minimal logging in production
logging.level.root=WARN
logging.level.com.shivam.digital_wallet=INFO
logging.pattern.console=%d{ISO8601} %5p %40.40logger{1.} - %msg%n

# Server
server.port=8080

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
