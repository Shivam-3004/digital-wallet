spring.application.name=digital-wallet

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/digital-wallet-dev
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:MyVerySecretKeyForDigitalWalletProject2026MyVerySecretKeyDevelopment}

# Logging
logging.level.root=INFO
logging.level.com.shivam.digital_wallet=DEBUG

# Server
server.port=8080
